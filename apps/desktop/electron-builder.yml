appId: dev.kmux.desktop
productName: kmux
electronUpdaterCompatibility: ">=2.16"

toolsets:
  appimage: "1.0.3"

directories:
  output: release
  buildResources: build

npmRebuild: false
asarUnpack:
  - "**/*.node"
  - "dist/pty-host/**"
extraResources:
  - from: ../../packages/cli/dist
    to: cli
  - from: build/icon.png
    to: notificationIcon.png
artifactBuildCompleted: ./build/artifact-build-completed.cjs

publish:
  provider: github
  owner: kkd927
  repo: kmux
  releaseType: release

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  sign: ./build/custom-mac-sign.cjs
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  target:
    - dmg
    - zip

linux:
  syncDesktopName: true
  category: Development;TerminalEmulator;Utility;
  synopsis: Keyboard-first terminal workspace manager for coding agents
  description: Run coding agents side by side without losing terminal output continuity.
  executableName: kmux
  desktop:
    entry:
      Name: kmux
      GenericName: AI Coding Agent Terminal
      Comment: Run coding agents side by side without losing terminal output continuity.
      Icon: kmux
      StartupNotify: "true"
      Terminal: "false"
      Keywords: AI;agent;terminal;developer;coding;
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  target:
    - AppImage
