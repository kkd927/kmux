name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  package-macos:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run rebuild:electron
      - name: Package macOS DMG
        run: npm run dist:mac --workspace @kmux/desktop -- --${{ matrix.arch }}
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}-dmg
          path: apps/desktop/release/*.dmg
          if-no-files-found: error

  publish-release:
    needs: package-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: macos-arm64-dmg
          path: release-assets
      - uses: actions/download-artifact@v8
        with:
          name: macos-x64-dmg
          path: release-assets
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s nullglob
          assets=(release-assets/*.dmg)
          test "${#assets[@]}" -gt 0
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
