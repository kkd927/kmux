name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release-metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      release_kind: ${{ steps.release.outputs.release_kind }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Validate release tag and package versions
        id: release
        if: github.event_name == 'push'
        run: node scripts/release-tag.mjs

  verify:
    needs: release-metadata
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  remote-runtime-artifacts:
    name: Remote runtime (${{ matrix.target }})
    needs: release-metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
            rust_target: aarch64-apple-darwin
          - target: darwin-x64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
          - target: linux-arm64-musl
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
          - target: linux-x64-musl
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    env:
      RUSTUP_TOOLCHAIN: 1.97.0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install pinned Rust toolchain and native target
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup target add --toolchain 1.97.0 "${{ matrix.rust_target }}"
      - name: Install native musl linker
        if: startsWith(matrix.target, 'linux-')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build and validate matching remote runtime
        run: npm run gate:ssh:native
      - name: Preserve remote runtime permissions
        run: |
          tar -C remote/kmuxd/dist \
            -cf "$RUNNER_TEMP/remote-runtime-${{ matrix.target }}.tar" \
            "${{ matrix.target }}"
      - name: Upload remote runtime artifact
        uses: actions/upload-artifact@v7
        with:
          name: remote-runtime-${{ matrix.target }}
          path: ${{ runner.temp }}/remote-runtime-${{ matrix.target }}.tar
          if-no-files-found: error
          compression-level: 0

  package-macos:
    needs:
      - release-metadata
      - remote-runtime-artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Validate macOS signing secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY_P8 APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub secret: $name" >&2
              exit 1
            fi
          done
      - name: Prepare Apple notarization credentials
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$api_key_path"
          chmod 600 "$api_key_path"
          {
            echo "APPLE_API_KEY=$api_key_path"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"
      - run: npm ci
      - name: Download remote runtime artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: remote-runtime-*
          path: ${{ runner.temp }}/remote-runtime-artifacts
          merge-multiple: true
      - name: Restore remote runtime artifacts
        run: |
          mkdir -p remote/kmuxd/dist
          for target in darwin-arm64 darwin-x64 linux-arm64-musl linux-x64-musl; do
            archive="$RUNNER_TEMP/remote-runtime-artifacts/remote-runtime-$target.tar"
            test -f "$archive"
            tar -xf "$archive" -C remote/kmuxd/dist
          done
      - run: npm run verify:remote:artifacts
      - run: npm run build
      - run: npm run rebuild:electron
      - name: Package macOS release assets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          KMUX_REQUIRE_SIGNING: "1"
        run: |
          extra_args=()
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            extra_args+=("-c.publish.channel=latest-arm64")
          fi
          npm run dist:mac --workspace @kmux/desktop -- --${{ matrix.arch }} -c.forceCodeSigning=true "${extra_args[@]}"
      - name: Verify signature, notarization, and update assets
        run: |
          app_path="$(find apps/desktop/release -maxdepth 2 -name '*.app' | head -n 1)"
          dmg_path="$(find apps/desktop/release -maxdepth 1 -name '*.dmg' | head -n 1)"
          zip_path="$(find apps/desktop/release -maxdepth 1 -name '*.zip' | head -n 1)"
          manifest_path="$(find apps/desktop/release -maxdepth 1 -name 'latest*-mac.yml' | head -n 1)"
          test -n "$app_path"
          test -n "$dmg_path"
          test -n "$zip_path"
          test -n "$manifest_path"
          codesign --verify --deep --strict "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"
      - name: Smoke packaged DMG
        run: npm run smoke:packaged:mac
      - name: Upload macOS release assets
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}-release-assets
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/latest*-mac.yml
          if-no-files-found: error
          compression-level: 0

  package-linux:
    needs:
      - release-metadata
      - remote-runtime-artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download remote runtime artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: remote-runtime-*
          path: ${{ runner.temp }}/remote-runtime-artifacts
          merge-multiple: true
      - name: Restore remote runtime artifacts
        run: |
          mkdir -p remote/kmuxd/dist
          for target in darwin-arm64 darwin-x64 linux-arm64-musl linux-x64-musl; do
            archive="$RUNNER_TEMP/remote-runtime-artifacts/remote-runtime-$target.tar"
            test -f "$archive"
            tar -xf "$archive" -C remote/kmuxd/dist
          done
      - run: npm run verify:remote:artifacts:cross-host
      - run: npm run build
      - run: npm run rebuild:electron
      - name: Package Linux release assets
        run: npm run dist:linux --workspace @kmux/desktop -- --${{ matrix.arch }}
      - name: Verify Linux release assets
        run: |
          shopt -s nullglob
          if [ "${{ matrix.arch }}" = "x64" ]; then
            appimages=(
              apps/desktop/release/kmux-*-linux-x64.AppImage
              apps/desktop/release/kmux-*-linux-x86_64.AppImage
            )
            manifests=(apps/desktop/release/latest-linux.yml)
          else
            appimages=(apps/desktop/release/kmux-*-linux-${{ matrix.arch }}.AppImage)
            manifests=(apps/desktop/release/latest-linux-${{ matrix.arch }}.yml)
          fi
          test "${#appimages[@]}" -eq 1
          test "${#manifests[@]}" -eq 1
          test -s "${appimages[0]}.blockmap"
      - name: Smoke packaged AppImage directly under Xvfb
        run: xvfb-run --auto-servernum npm run smoke:packaged:linux -- --allow-any-linux-desktop
      - name: Upload Linux release assets
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}-release-assets
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.AppImage.blockmap
            apps/desktop/release/latest-linux*.yml
          if-no-files-found: error
          compression-level: 0

  publish-release:
    if: github.event_name == 'push'
    needs:
      - release-metadata
      - verify
      - package-macos
      - package-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: "*-release-assets"
          path: release-assets
          merge-multiple: true
      - name: Verify update manifest assets
        run: |
          shopt -s nullglob
          mac_manifests=(release-assets/latest*-mac.yml)
          linux_manifests=(release-assets/latest-linux*.yml)
          zips=(release-assets/*.zip)
          appimages=(release-assets/*.AppImage)
          appimage_blockmaps=(release-assets/*.AppImage.blockmap)
          test "${#mac_manifests[@]}" -eq 2
          test "${#linux_manifests[@]}" -eq 2
          test "${#zips[@]}" -gt 0
          test "${#appimages[@]}" -eq 2
          test "${#appimage_blockmaps[@]}" -eq 2
          test -f release-assets/latest-linux.yml
          test -f release-assets/latest-linux-arm64.yml
      - name: Create versionless download aliases
        run: |
          shopt -s nullglob
          for arch in arm64 x64; do
            matches=(release-assets/kmux-*-mac-${arch}.dmg)
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "Expected exactly 1 source DMG for $arch, found ${#matches[@]}: ${matches[*]:-<none>}" >&2
              exit 1
            fi
            cp "${matches[0]}" "release-assets/kmux-mac-${arch}.dmg"
          done
          for arch in x64 arm64; do
            if [ "$arch" = "x64" ]; then
              linux_matches=(
                release-assets/kmux-*-linux-x64.AppImage
                release-assets/kmux-*-linux-x86_64.AppImage
              )
            else
              linux_matches=(release-assets/kmux-*-linux-${arch}.AppImage)
            fi
            if [ "${#linux_matches[@]}" -ne 1 ]; then
              echo "Expected exactly 1 source AppImage for Linux $arch, found ${#linux_matches[@]}: ${linux_matches[*]:-<none>}" >&2
              exit 1
            fi
            cp "${linux_matches[0]}" "release-assets/kmux-linux-${arch}.AppImage"
          done
          test -f release-assets/kmux-mac-arm64.dmg
          test -f release-assets/kmux-mac-x64.dmg
          test -f release-assets/kmux-linux-x64.AppImage
          test -f release-assets/kmux-linux-arm64.AppImage
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_KIND: ${{ needs.release-metadata.outputs.release_kind }}
          IS_PRERELEASE: ${{ needs.release-metadata.outputs.is_prerelease }}
        run: |
          shopt -s nullglob
          assets=(
            release-assets/*.dmg
            release-assets/*.AppImage
            release-assets/*.AppImage.blockmap
            release-assets/*.zip
            release-assets/latest*-mac.yml
            release-assets/latest-linux*.yml
          )
          test "${#assets[@]}" -gt 0
          case "$RELEASE_KIND:$IS_PRERELEASE" in
            stable:false)
              release_args=(--latest --prerelease=false)
              ;;
            prerelease:true)
              release_args=(--latest=false --prerelease)
              ;;
            *)
              echo "Invalid release metadata: kind=$RELEASE_KIND prerelease=$IS_PRERELEASE" >&2
              exit 1
              ;;
          esac
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --draft=false \
              "${release_args[@]}"
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            notes_args=(--generate-notes)
            release_notes_path="docs/release-notes/${GITHUB_REF_NAME}.md"
            if [ -f "$release_notes_path" ]; then
              notes_args+=(--notes "$(cat "$release_notes_path")")
            fi
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" \
              --verify-tag \
              "${release_args[@]}" \
              "${notes_args[@]}"
          fi
