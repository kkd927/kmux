name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  package-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Validate macOS signing secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY_P8 APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub secret: $name" >&2
              exit 1
            fi
          done
      - name: Prepare Apple notarization credentials
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$api_key_path"
          chmod 600 "$api_key_path"
          {
            echo "APPLE_API_KEY=$api_key_path"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
          } >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run build
      - run: npm run rebuild:electron
      - name: Package macOS release assets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          KMUX_REQUIRE_SIGNING: "1"
        run: |
          extra_args=()
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            extra_args+=("-c.publish.channel=latest-arm64")
          fi
          npm run dist:mac --workspace @kmux/desktop -- --${{ matrix.arch }} -c.forceCodeSigning=true "${extra_args[@]}"
      - name: Verify signature, notarization, and update assets
        run: |
          app_path="$(find apps/desktop/release -maxdepth 2 -name '*.app' | head -n 1)"
          dmg_path="$(find apps/desktop/release -maxdepth 1 -name '*.dmg' | head -n 1)"
          zip_path="$(find apps/desktop/release -maxdepth 1 -name '*.zip' | head -n 1)"
          manifest_path="$(find apps/desktop/release -maxdepth 1 -name 'latest*-mac.yml' | head -n 1)"
          test -n "$app_path"
          test -n "$dmg_path"
          test -n "$zip_path"
          test -n "$manifest_path"
          codesign --verify --deep --strict "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"
      - name: Smoke packaged DMG
        run: npm run smoke:packaged:mac
      - name: Upload macOS release assets
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}-release-assets
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/latest*-mac.yml
          if-no-files-found: error
          compression-level: 0

  publish-release:
    if: github.event_name == 'push'
    needs:
      - verify
      - package-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: macos-*-release-assets
          path: release-assets
          merge-multiple: true
      - name: Verify update manifest assets
        run: |
          shopt -s nullglob
          manifests=(release-assets/latest*-mac.yml)
          zips=(release-assets/*.zip)
          test "${#manifests[@]}" -eq 2
          test "${#zips[@]}" -gt 0
      - name: Create versionless DMG aliases
        run: |
          shopt -s nullglob
          for arch in arm64 x64; do
            matches=(release-assets/kmux-*-mac-${arch}.dmg)
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "Expected exactly 1 source DMG for $arch, found ${#matches[@]}: ${matches[*]:-<none>}" >&2
              exit 1
            fi
            cp "${matches[0]}" "release-assets/kmux-mac-${arch}.dmg"
          done
          test -f release-assets/kmux-mac-arm64.dmg
          test -f release-assets/kmux-mac-x64.dmg
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s nullglob
          assets=(
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/latest*-mac.yml
          )
          test "${#assets[@]}" -gt 0
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
