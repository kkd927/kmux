name: Update model pricing

on:
  schedule:
    - cron: "17 18 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run update:model-pricing
      - run: npm run test -- packages/metadata/src/modelPricing.test.ts
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/update-model-pricing
          commit-message: Update model pricing metadata
          title: Update model pricing metadata
          body: |
            Automated weekly refresh from official model pricing pages.

            Sources:
            - https://docs.anthropic.com/en/docs/about-claude/pricing
            - https://developers.openai.com/api/docs/pricing
            - https://ai.google.dev/gemini-api/docs/pricing
          labels: automated
